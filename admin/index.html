<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Action Adjusters Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../styles.css" />
    <link rel="stylesheet" href="admin.css" />
  </head>
  <body class="admin-body">
    <main class="admin-shell">
      <section class="admin-login" data-login-panel>
        <img src="../assets/action-adjusters-logo.png" alt="Action Adjusters" />
        <p class="eyebrow">Admin dashboard</p>
        <form class="admin-login-form">
          <label>
            Username
            <input name="username" type="text" autocomplete="username" required />
          </label>
          <label>
            Admin password
            <input name="password" type="password" autocomplete="current-password" required />
          </label>
          <button class="button primary" type="submit">Log In</button>
          <p class="admin-status" role="status" aria-live="polite"></p>
        </form>
      </section>

      <section class="admin-dashboard" data-dashboard hidden>
        <aside class="admin-sidebar">
          <div class="admin-brand-block">
            <img src="../assets/action-adjusters-logo.png" alt="Action Adjusters" />
            <p class="eyebrow">Action Adjusters</p>
            <h1>Dashboard</h1>
          </div>

          <div class="admin-summary">
            <div data-total-card>
              <span data-total>0</span>
              <strong>Total notifications</strong>
            </div>
            <div data-latest-card>
              <span data-latest>None yet</span>
              <strong>Latest submission</strong>
            </div>
          </div>

          <div class="admin-view-toggle crm-nav" role="tablist" aria-label="CRM views">
            <button class="is-active" type="button" data-crm-view="inquiries">Inquiries</button>
            <button type="button" data-crm-view="leads">Leads</button>
            <button type="button" data-crm-view="clients">Clients</button>
            <button type="button" data-crm-view="documents">Documents</button>
            <button type="button" data-crm-view="portal">Portal</button>
            <button type="button" data-crm-view="profile">Profile</button>
            <button type="button" data-crm-view="trash">Trash</button>
          </div>

          <div class="admin-actions">
            <button class="button secondary" type="button" data-logout>Log Out</button>
          </div>
        </aside>

        <section class="admin-content" aria-labelledby="admin-title">
          <header class="admin-dashboard-header">
            <div>
              <p class="eyebrow">Dashboard</p>
              <h1 id="admin-title">Claim Inquiry Notification</h1>
            </div>
            <button class="admin-icon-button" type="button" data-refresh aria-label="Refresh claims" title="Refresh claims">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M21 12a9 9 0 0 1-15.5 6.2" />
                <path d="M3 12A9 9 0 0 1 18.5 5.8" />
                <path d="M18 2v4h4" />
                <path d="M6 22v-4H2" />
              </svg>
            </button>
          </header>

          <form class="admin-filter-bar" role="search">
            <label class="search-field">
              Search
              <input type="search" data-search placeholder="Name, phone, email, notes..." />
            </label>
            <label>
              Status
              <select data-status-filter>
                <option value="all">All</option>
                <option value="new">New</option>
                <option value="completed">Completed</option>
                <option value="archived">Archived</option>
                <option value="lead">Lead</option>
                <option value="client">Client</option>
              </select>
            </label>
            <label>
              Damage
              <select data-damage-filter>
                <option value="all">All damage</option>
              </select>
            </label>
            <label>
              Uploader
              <select data-uploader-filter>
                <option value="all">All uploaders</option>
                <option value="admin">Admin</option>
                <option value="client">Client Portal</option>
              </select>
            </label>
            <label>
              Sort
              <select data-sort>
                <option value="newest">Newest first</option>
                <option value="oldest">Oldest first</option>
                <option value="name">Name A-Z</option>
                <option value="phone">Phone A-Z</option>
                <option value="email">Email A-Z</option>
                <option value="damage">Damage A-Z</option>
                <option value="status">Status A-Z</option>
                <option value="uploader">Uploader A-Z</option>
                <option value="document">Document A-Z</option>
              </select>
            </label>
          </form>

          <p class="dashboard-message" data-dashboard-message role="status" aria-live="polite" hidden></p>
          <div class="notification-list" data-notifications></div>
        </section>
      </section>
    </main>

    <script src="admin.js"></script>
  </body>
</html>
